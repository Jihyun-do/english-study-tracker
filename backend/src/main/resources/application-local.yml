spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:english_study}?characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useUnicode=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
    hikari:
      pool-name: EnglishStudyHikariPool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: 920507224309-a1sql8fvk9977rh7fkrnejrvvkp991vk.apps.googleusercontent.com
            client-secret: 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
            scope:
              - email
              - profile
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
            user-name-attribute: sub

jwt:
  secret: ${JWT_SECRET:local-dev-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}

logging:
  level:
    com.jude.englishstudy: debug
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: TRACE
    org.springframework.security.oauth2: TRACE

