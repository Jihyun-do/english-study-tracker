spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:english_study;MODE=MariaDB;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: test-client-id
            client-secret: test-client-secret

jwt:
  secret: test-jwt-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
  access-token-expiration: 1h
  refresh-token-expiration: 14d

app:
  frontend-url: http://localhost:5173

logging:
  level:
    root: warn
    com.jude.englishstudy: info
